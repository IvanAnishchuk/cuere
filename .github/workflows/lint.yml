name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff check (SARIF report)
        if: always()
        run: |
          mkdir -p .reports/lint
          uv run ruff check --output-format sarif \
            --output-file .reports/lint/ruff-check.sarif.json . || true

      - name: Ruff format check
        if: always()
        run: uv run ruff format --check .

      - name: Upload Ruff SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: .reports/lint/ruff-check.sarif.json
          category: ruff
        continue-on-error: true

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lint-reports
          path: .reports/lint/
          include-hidden-files: true
          retention-days: 14
