# Relaxed mypy config used ONLY by mutmut's type-check pass (type_check_command).
# Goal: flag genuine type errors a mutation introduces (e.g. a None argument)
# while ignoring mutmut's own scaffolding — the mutmut.mutation.trampoline import,
# the untyped trampoline decorator, and injected "# type: ignore" comments — which
# the project's strict config (in pyproject.toml) would otherwise report on
# non-mutant lines and crash mutmut's error->mutant mapping.
[mypy]
python_version = 3.13
ignore_missing_imports = true
