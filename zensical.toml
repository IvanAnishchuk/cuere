# Zensical documentation site configuration (new zensical.toml format, NOT
# legacy mkdocs.yml). Modelled on /home/user/src/oauth/zensical.toml and the
# zensical bootstrap template. Build: `uv run zensical build --clean --strict`.
# See issue #10 (this scaffold) and the docs epic #11-#16.

[project]
site_name = "cuere"
site_description = "QR codes in your terminal: Unicode half-block rendering, Rich integration, wallet-URI helpers"
site_url = "https://ivananishchuk.github.io/cuere/"
repo_url = "https://github.com/IvanAnishchuk/cuere"
repo_name = "IvanAnishchuk/cuere"
docs_dir = "docs"
site_dir = "site"
copyright = "Released to the public domain under CC0-1.0."

# Custom stylesheet (copied from docs/ into the built site, linked after the
# theme CSS). Forces line-height:1 on `.qr` half-block QR-art blocks so the
# embedded codes stay scannable — see docs/stylesheets/qr.css and issue #68.
extra_css = ["stylesheets/qr.css"]

nav = [
    { "Home" = "index.md" },
    { "Quickstart" = "quickstart.md" },
    { "Guides" = [
        { "Rendering & scanning" = "guides/rendering.md" },
        { "Terminal colors" = "colors.md" },
        { "Output formats" = "output-formats.md" },
    ] },
    { "Cookbook" = [
        { "Wallet URIs" = "cookbook/wallet-uris.md" },
        { "Exporting" = "cookbook/exporting.md" },
    ] },
    { "Reference" = [
        { "CLI reference" = "cli-reference.md" },
        { "API reference" = "reference/api.md" },
        { "BIP-21 (Bitcoin)" = "bip-21.md" },
        { "Lightning (BOLT11/LNURL/BOLT12)" = "lightning-uri.md" },
        { "EIP-681 (Ethereum)" = "eip-681.md" },
    ] },
    { "Security" = [
        { "OSPS Baseline" = "security/osps-baseline.md" },
        { "Architecture & design" = "security/design.md" },
        { "Threat model" = "security/threat-model.md" },
        { "Dependency management" = "security/dependencies.md" },
    ] },
    { "Contributing" = [
        { "Building from source" = "building.md" },
        { "Mutation testing" = "mutation-testing.md" },
        { "Fuzzing" = "fuzzing.md" },
    ] },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.sections",
    "navigation.indexes",
    "navigation.top",
    "navigation.tracking",
    "navigation.path",
    "navigation.footer",
    "search.highlight",
    "search.suggest",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "content.tooltips",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/IvanAnishchuk/cuere"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/cuere/"

# ----------------------------------------------------------------------------
# Markdown extensions (the standard Material/zensical set). The CLI-reference
# extension (mkdocs_typer2.markdown, with pretty=true / engine="native") is
# wired in issue #11 alongside docs/cli-reference.md.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

# CLI reference (issue #11): mkdocs-typer2's zensical-native markdown extension.
# Renders the typer app from a `::: mkdocs-typer2` block in docs/cli-reference.md.
# NOTE: the key MUST be a quoted literal "mkdocs_typer2.markdown" — zensical only
# hoists dotted keys for the `pymdownx.*` / `zensical.*` namespaces, so an
# unquoted `[...mkdocs_typer2.markdown]` would register the extension as just
# `mkdocs_typer2` (→ "no attribute makeExtension"). See _convert_markdown_extensions.
[project.markdown_extensions."mkdocs_typer2.markdown"]
pretty = true
engine = "native"

# ----------------------------------------------------------------------------
# Plugins
# ----------------------------------------------------------------------------
# API reference (issue #12, SPIKE): mkdocstrings python handler. zensical has
# built-in mkdocstrings support (since v0.0.11) configured here under
# [project.plugins.mkdocstrings.config]; the handler reads `paths` for griffe.
[project.plugins.mkdocstrings.config]
default_handler = "python"
[project.plugins.mkdocstrings.config.handlers.python]
paths = ["src"]
[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "sphinx"
show_source = false
show_root_heading = true
show_root_full_path = false
heading_level = 2
members_order = "source"
separate_signature = true
