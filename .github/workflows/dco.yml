name: DCO

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      # Stdlib-only check: no project install needed, keeping the job fast.
      # base/head SHAs are passed via env (not interpolated into the shell).
      - name: Check DCO sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 scripts/check_dco.py range "$BASE_SHA" "$HEAD_SHA"
